<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Live</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    background: transparent;
  }
  h2 {
    margin: 20px 0 8px 0;
    color: #1a3c6e;
    font-size: 20px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 20px;
    font-size: 14px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: center;
  }
  th {
    background-color: #1a3c6e;
    color: white;
  }
  tr:nth-child(even) {
    background-color: #f2f2f2;
  }
  .updated {
    font-size: 11px;
    color: #888;
    text-align: right;
    margin-top: -10px;
    margin-bottom: 15px;
  }
  .loading {
    color: #999;
    font-style: italic;
  }
</style>
</head>
<body>

<h2>📅 Calendario / Vetrina Partite</h2>
<div id="vetrina" class="loading">Caricamento...</div>

<h2>🏆 Classifica Girone 1</h2>
<div id="girone1" class="loading">Caricamento...</div>

<h2>🏆 Classifica Girone 2</h2>
<div id="girone2" class="loading">Caricamento...</div>

<div class="updated" id="lastupdate"></div>

<script>
  const API_KEY = "AIzaSyADZOK64ObVqJ2Y7OOgkz2tegnTYz83ADg";
  const SPREADSHEET_ID = "1kk6G2HOui_zVkL5rd68wK65q2qnMp9BNNkB3U54ZwXw";

  const ranges = {
    vetrina: "Vetrina_partite!A1:E30",
    girone1: "Classifica_Girone 1!A1:H6",
    girone2: "Classifica_Girone 2!A1:H6"
  };

  function buildTable(values) {
    if (!values || values.length === 0) return "<p>Nessun dato disponibile.</p>";
    let html = "<table>";
    values.forEach((row, i) => {
      html += "<tr>";
      row.forEach(cell => {
        const tag = i === 0 ? "th" : "td";
        html += `<${tag}>${cell !== undefined ? cell : ""}</${tag}>`;
      });
      html += "</tr>";
    });
    html += "</table>";
    return html;
  }

  async function fetchSheet(elementId, range) {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) {
        document.getElementById(elementId).innerHTML =
          `<p style="color:red;">Errore: ${data.error.message}</p>`;
        return;
      }
      document.getElementById(elementId).innerHTML = buildTable(data.values);
    } catch (err) {
      document.getElementById(elementId).innerHTML =
        `<p style="color:red;">Errore di connessione.</p>`;
    }
  }

  async function refreshAll() {
    await Promise.all([
      fetchSheet("vetrina", ranges.vetrina),
      fetchSheet("girone1", ranges.girone1),
      fetchSheet("girone2", ranges.girone2)
    ]);
    document.getElementById("lastupdate").textContent =
      "Ultimo aggiornamento: " + new Date().toLocaleTimeString("it-IT");
  }

  refreshAll();
  setInterval(refreshAll, 8000); // aggiorna ogni 8 secondi
</script>

</body>
</html>
